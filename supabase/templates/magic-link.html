<!doctype html>
<html lang="zh-CN">
  <body style="margin:0;background:#f5f5f3;color:#111;font-family:Arial,'PingFang SC',sans-serif;">
    <div style="max-width:520px;margin:32px auto;padding:32px;border:1px solid #ddd;border-radius:18px;background:#fff;">
      <p style="margin:0 0 12px;color:#888;font-size:12px;letter-spacing:.18em;">WHITEROOM DEV</p>
      <h1 style="margin:0 0 18px;font-size:28px;">登录验证码</h1>
      <p style="margin:0 0 22px;color:#666;line-height:1.7;">请输入下面的 6 位验证码继续登录：</p>
      <p style="margin:0;padding:18px;border-radius:12px;background:#111;color:#fff;font-family:monospace;font-size:32px;font-weight:700;letter-spacing:.28em;text-align:center;">{{ .Token }}</p>
      <p style="margin:22px 0 0;color:#999;font-size:12px;line-height:1.6;">验证码将在 1 小时后失效。如果不是你发起的请求，请忽略此邮件。</p>
