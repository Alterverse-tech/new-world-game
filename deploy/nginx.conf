# 《眠海》平台 nginx 反向代理样例（TLS 终止 + SSE + WebSocket）
# 放入 /etc/nginx/sites-available/ 并按需替换域名与证书路径。

upstream whiteroom {
  server 127.0.0.1:8787;
  keepalive 32;
}

server {
  listen 443 ssl http2;
  server_name dreamsea.example.com;

  ssl_certificate     /etc/letsencrypt/live/dreamsea.example.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/dreamsea.example.com/privkey.pem;

  # 关卡包上限 40MB + multipart 余量
  client_max_body_size 48m;

  # 应用层已按 Accept-Encoding 压缩（带 Vary），nginx 不再二次压缩
  gzip off;

  location / {
    proxy_pass http://whiteroom;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header Connection "";
  }

  # SSE：关闭缓冲，保证事件即时送达
  location /api/lobby/events {
    proxy_pass http://whiteroom;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header Connection "";
    proxy_buffering off;
    proxy_cache off;
    proxy_read_timeout 1h;
  }

  # WebSocket：多人同步升级
  location /api/lobby/multiplayer {
    proxy_pass http://whiteroom;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_read_timeout 1h;
  }
}

server {
  listen 80;
  server_name dreamsea.example.com;
  return 301 https://$host$request_uri;
}
